services:
  kanidm-discord-bot:
    image: ghcr.io/kallama/kanidm-discord-bot:latest
    container_name: kanidm-discord-bot
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=10M,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    pids_limit: 64
