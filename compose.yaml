services:
  kanidm-discord-bot:
    build:
      context: .
      dockerfile: Containerfile
    image: ghcr.io/kallama/kanidm-discord-bot:latest
    container_name: kanidm-discord-bot
    user: "${BOT_UID:-1000}:${BOT_GID:-1000}"
    env_file: .env
    volumes:
      - bot-data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=10M,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    pids_limit: 64

volumes:
  bot-data:
